# =============================================================================
# GitHub Actions Workflow: Windows Build
# =============================================================================
#
# Builds GNostr Signer for Windows using MSYS2/MinGW-w64 and creates an
# NSIS installer package.
#
# Triggers:
#   - Push to main/master branch
#   - Pull requests targeting main/master
#   - Manual workflow dispatch
#   - Release tags (v*)
#
# =============================================================================

name: Windows Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run with debug logging'
        required: false
        default: false
        type: boolean

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-json-glib
            mingw-w64-x86_64-jansson
            mingw-w64-x86_64-libsodium
            mingw-w64-x86_64-libsecret
            mingw-w64-x86_64-libwebsockets
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-libsoup3
            mingw-w64-x86_64-nsis

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build nsync from source (if not packaged)
        run: |
          if ! pkg-config --exists nsync 2>/dev/null; then
            git clone --depth 1 https://github.com/google/nsync.git $HOME/nsync-src
            cmake -S $HOME/nsync-src -B $HOME/nsync-build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release -DNSYNC_ENABLE_TESTS=OFF
            cmake --build $HOME/nsync-build --target nsync -j
            # Install C library and headers (skip nsync_cpp which may fail on MinGW)
            cp $HOME/nsync-build/libnsync.a /mingw64/lib/ 2>/dev/null || true
            cp $HOME/nsync-src/public/nsync*.h /mingw64/include/ 2>/dev/null || true
            # Create minimal pkg-config file (use printf to avoid heredoc indentation issues)
            printf '%s\n' \
              'prefix=/mingw64' \
              'libdir=${prefix}/lib' \
              'includedir=${prefix}/include' \
              '' \
              'Name: nsync' \
              'Description: nsync C library' \
              'Version: 1.29.2' \
              'Libs: -L${libdir} -lnsync' \
              'Cflags: -I${includedir}' \
              > /mingw64/lib/pkgconfig/nsync.pc
          fi

      - name: Build secp256k1 from source (if not packaged)
        run: |
          if ! pkg-config --exists libsecp256k1 2>/dev/null; then
            git clone --depth 1 https://github.com/bitcoin-core/secp256k1.git $HOME/secp256k1-src
            cmake -S $HOME/secp256k1-src -B $HOME/secp256k1-build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX=/mingw64 \
              -DSECP256K1_BUILD_TESTS=OFF \
              -DSECP256K1_BUILD_EXHAUSTIVE_TESTS=OFF \
              -DSECP256K1_BUILD_BENCHMARK=OFF
            cmake --build $HOME/secp256k1-build -j
            cmake --install $HOME/secp256k1-build
          fi

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=build/install \
            -DBUILD_TESTING=OFF \
            -DBUILD_TESTING_FRAMEWORK=OFF \
            -DBUILD_SIGNER_TESTS=OFF \
            -DBUILD_NATIVE_HOST=ON \
            -DBUILD_WINDOWS_INSTALLER=ON \
            -DBUILD_LIBMARMOT=OFF \
            -DBUILD_MARMOT_GOBJECT=OFF \
            -DBUILD_GNOSTR_APP=OFF \
            -DBUILD_RELAYD=OFF \
            -DSIGNET_ENABLE=OFF \
            -DENABLE_NIP55L=OFF \
            -DWITH_NOSTRDB=OFF \
            -DLIBNOSTR_WITH_NOSTRDB=OFF \
            -DGNOSTR_SIGNER_VERSION=${{ steps.version.outputs.version }}

      - name: Build
        run: |
          cmake --build build --parallel $(nproc)

      - name: Bundle dependencies
        run: |
          cd apps/gnostr-signer/packaging/windows
          ./bundle-deps.sh --build-dir ../../../../build --output-dir ../../../../build/deps

      - name: Create NSIS installer
        run: |
          cd apps/gnostr-signer/packaging/windows
          makensis \
            -DVERSION=${{ steps.version.outputs.version }} \
            -DARCH=x64 \
            -DBUILD_DIR=../../../../build \
            -DDEPS_DIR=../../../../build/deps \
            gnostr-signer.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GNostrSigner-${{ steps.version.outputs.version }}-x64-setup
          path: apps/gnostr-signer/packaging/windows/GNostrSigner-*.exe
          if-no-files-found: error

      - name: Upload portable build
        uses: actions/upload-artifact@v4
        with:
          name: GNostrSigner-${{ steps.version.outputs.version }}-x64-portable
          path: |
            build/apps/gnostr-signer/gnostr-signer.exe
            build/apps/gnostr-signer/gnostr-signer-daemon.exe
            build/deps/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: GNostrSigner-*
          path: artifacts
          merge-multiple: true

      - name: Calculate checksums
        run: |
          cd artifacts
          sha256sum *.exe > SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.exe
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
          draft: true
