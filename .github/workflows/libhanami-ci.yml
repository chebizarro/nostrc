name: libhanami CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }} • libhanami
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    env:
      CMAKE_BUILD_TYPE: Debug
      ASAN_OPTIONS: detect_leaks=0:detect_odr_violation=0:strict_string_checks=1
      UBSAN_OPTIONS: print_stacktrace=1

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Select clang toolchain (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
                                  build-essential cmake ninja-build pkg-config clang \
                                  libjansson-dev libsecp256k1-dev libwebsockets-dev libsodium-dev \
                                  libssl-dev libcurl4-openssl-dev libglib2.0-dev libsoup-3.0-dev \
                                  libjson-glib-dev libgit2-dev libnsync-dev
          echo "LDFLAGS='-fuse-ld=lld'" >> $GITHUB_ENV

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install ninja pkg-config jansson secp256k1 libwebsockets libsodium openssl@3 libsoup@3 nsync flatcc json-glib libgit2 || true
          echo "PKG_CONFIG_PATH=/opt/homebrew/opt/openssl@3/lib/pkgconfig:/opt/homebrew/opt/libsoup@3/lib/pkgconfig:/opt/homebrew/opt/libwebsockets/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:/opt/homebrew/opt/flatcc/lib/pkgconfig:${PKG_CONFIG_PATH}" >> $GITHUB_ENV
          echo "CPPFLAGS=-I/opt/homebrew/include ${CPPFLAGS}" >> $GITHUB_ENV
          echo "LDFLAGS=-L/opt/homebrew/lib ${LDFLAGS}" >> $GITHUB_ENV

      - name: Configure libhanami-focused build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} -DCMAKE_VERBOSE_MAKEFILE=ON \
            -DGO_ENABLE_ASAN=ON -DGO_ENABLE_UBSAN=ON -DGO_WARNINGS_AS_ERRORS=ON \
            -DBUILD_LIBHANAMI=ON -DBUILD_LIBMARMOT=OFF -DBUILD_MARMOT_GOBJECT=OFF \
            -DBUILD_NOSTR_GOBJECT=OFF -DBUILD_NOSTR_GTK=OFF -DBUILD_APPS=OFF \
            -DBUILD_RELAYD=OFF -DSIGNET_ENABLE=OFF \
            -DWITH_NOSTRDB=OFF -DLIBNOSTR_WITH_NOSTRDB=OFF

      - name: Build
        run: cmake --build build -j --verbose

      - name: Run libhanami tests
        run: ctest --test-dir build --output-on-failure -L libhanami -j2

      - name: Archive logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-libhanami-logs
          path: |
            build/Testing/Temporary/*
            build/Testing/*/LastTest.log
            build/CTestTestfile.cmake
          if-no-files-found: ignore
