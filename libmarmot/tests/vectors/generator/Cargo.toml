[package]
name = "marmot-vector-gen"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "generate-vectors"
path = "src/main.rs"

[dependencies]
mdk-core = { path = "/Users/bizarro/Documents/Dev/mdk/crates/mdk-core" }
mdk-memory-storage = { path = "/Users/bizarro/Documents/Dev/mdk/crates/mdk-memory-storage" }
mdk-storage-traits = { path = "/Users/bizarro/Documents/Dev/mdk/crates/mdk-storage-traits" }
nostr = { version = "0.44", features = ["std", "nip44"] }
openmls = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
hex = "0.4"
sha2 = "0.10"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
base64 = "0.22"
