<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Allow signetd to own the net.signet bus name on the system bus. -->
  <policy user="signet">
    <allow own="net.signet.Signer"/>
  </policy>

  <!-- Allow any local user to call methods on net.signet.Signer.
       Actual authorization is enforced by Signet's capability engine
       using SO_PEERCRED UID → agent_id mapping. -->
  <policy context="default">
    <allow send_destination="net.signet.Signer"/>
    <allow send_interface="net.signet.Signer"/>
    <allow send_interface="net.signet.Credentials"/>
  </policy>
</busconfig>
