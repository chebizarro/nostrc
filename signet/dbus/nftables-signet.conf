# nftables rules for Signet D-Bus TCP transport.
# Restrict TCP port 47472 to the management network only.
#
# Install: cp nftables-signet.conf /etc/nftables.d/signet.conf
# Then: nft -f /etc/nftables.d/signet.conf

table inet signet {
  chain input {
    type filter hook input priority filter; policy accept;

    # Allow Signet D-Bus TCP from management network only (adjust CIDR).
    tcp dport 47472 ip saddr 10.0.0.0/8 accept
    tcp dport 47472 ip saddr 172.16.0.0/12 accept
    tcp dport 47472 ip saddr 192.168.0.0/16 accept

    # Drop all other connections to the Signet D-Bus TCP port.
    tcp dport 47472 drop
  }
}
